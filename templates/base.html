<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Student Result Predictor</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#f0f2f5;color:#333}
    .navbar{background:#5341E5;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
    .navbar h1{font-size:18px}
    .navbar a{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,0.2);padding:6px 14px;border-radius:6px}
    .navbar a:hover{background:rgba(255,255,255,0.35)}
    .nav-links{display:flex;gap:8px;align-items:center}
    .nav-links a{background:transparent;padding:6px 12px}
    .nav-links a:hover{background:rgba(255,255,255,0.2)}
    .container{max-width:900px;margin:30px auto;padding:0 16px}
    .card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
    .card h2{font-size:16px;margin-bottom:16px;color:#333}
    .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
    .metric{background:#fff;border-radius:10px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
    .metric .val{font-size:28px;font-weight:700}
    .metric .lbl{font-size:12px;color:#888;margin-top:4px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:13px;color:#555;margin-bottom:5px;font-weight:600}
    .form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
    .form-group input:focus,.form-group select:focus{border-color:#5341E5}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .btn{padding:9px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
    .btn-primary{background:#5341E5;color:#fff}
    .btn-primary:hover{background:#4534c7}
    .btn-secondary{background:#f0f0f0;color:#333}
    .btn-secondary:hover{background:#e0e0e0}
    .btn-danger{background:#E24B4A;color:#fff;font-size:12px;padding:5px 12px}
    .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600}
    .badge-pass{background:#EAF3DE;color:#3B6D11}
    .badge-fail{background:#FCEBEB;color:#A32D2D}
    .result-box{text-align:center;padding:24px;border-radius:12px;margin-top:16px}
    .result-pass{background:#EAF3DE;border:2px solid #97C459}
    .result-fail{background:#FCEBEB;border:2px solid #F09595}
    .result-box .big{font-size:32px;font-weight:700;margin-bottom:6px}
    .result-pass .big{color:#3B6D11}
    .result-fail .big{color:#A32D2D}
    .alert-err{background:#FCEBEB;color:#A32D2D;padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:13px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;background:#f8f8f8;border-bottom:2px solid #eee;color:#555}
    td{padding:9px 12px;border-bottom:1px solid #f0f0f0}
    tr:hover td{background:#fafafa}
    .empty{text-align:center;padding:30px;color:#aaa;font-size:14px}
    .progress{height:10px;background:#eee;border-radius:10px;overflow:hidden;margin-top:8px;max-width:200px;margin-left:auto;margin-right:auto}
    .progress-bar{height:100%;border-radius:10px}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .bar-lbl{font-size:12px;color:#888;width:100px;text-align:right}
    .bar-bg{flex:1;height:14px;background:#f0f0f0;border-radius:10px;overflow:hidden}
    .bar-fill{height:100%;border-radius:10px}
    .bar-val{font-size:12px;color:#888;width:36px}
  </style>
</head>
<body>
{% if session.user %}
<div class="navbar">
  <h1>🎓 Student Result Predictor</h1>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/add">Add Student</a>
    <a href="/students">All Students</a>
    <a href="/predict">Predict</a>
    <a href="/logout">Logout</a>
  </div>
</div>
{% endif %}
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
